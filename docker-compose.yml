services:
  db:
    image: postgres:17.5-alpine
    restart: no
    shm_size: 128mb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: v2i
    profiles:
      - dev
      - prod
      - db

  adminer:
    image: adminer
    restart: no
    ports:
      - "8080:8080"
    profiles:
      - dev
      - db

  rabbitmq:
    image: 'rabbitmq:3.13-management-alpine'
    environment:
      - 'RABBITMQ_DEFAULT_PASS=root'
      - 'RABBITMQ_DEFAULT_USER=root'
    ports:
      - "5672:5672"
      - "15672:15672"
    profiles:
      - dev
      - prod

  localstack:
    image: localstack/localstack:4.13.1
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,lambda
      - DEBUG=1
      - AWS_ACCESS_KEY_ID=root
      - AWS_SECRET_ACCESS_KEY=root
      - AWS_DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LAMBDA_DOCKER_FLAGS="--add-host=host.docker.internal:host-gateway"
      - EXTRA_CORS_ALLOWED_ORIGINS=*
      - PROCESSING_APP_URL=http://host.docker.internal:18000/extract-frames
      - S3_ENDPOINT=http://host.docker.internal:4566
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack/init.sh:/etc/localstack/init/ready.d/init-aws.sh"
      - "./localstack/lambda/s3_event_handler.py:/lambdas/s3_event_handler.py"
    profiles:
      - dev